
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REIT LENS | INSTITUTIONAL TERMINAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #010409;
            color: #f1f5f9;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* Desktop app feel — disable text selection on chrome */
        button, nav, aside, header, [role="complementary"], [role="navigation"] {
            -webkit-user-select: none;
            user-select: none;
        }

        /* Smooth focus rings */
        :focus-visible {
            outline: 1px solid #48A3CC;
            outline-offset: 2px;
            transition: outline-color 0.2s ease;
        }

        /* Electron titlebar offset */
        .electron-app .layout-root {
            padding-top: 38px;
        }
        
        /* Editorial Headers (Noe Style) */
        .header-noe {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }

        /* Functional Text (Flama Style) */
        .text-flama {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 500;
        }

        .aegis-card {
            background: linear-gradient(135deg, rgba(2, 45, 91, 0.5) 0%, rgba(1, 4, 9, 0.8) 100%);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(95, 154, 174, 0.2);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .aegis-card:hover {
            border-color: #48A3CC;
            box-shadow: 0 12px 30px -10px rgba(2, 45, 91, 0.6);
        }

        /* Gold braiding remains but using Rain as secondary structural color */
        .gold-braiding::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 12px; height: 12px;
            border-top: 2px solid #FF9D3C;
            border-left: 2px solid #FF9D3C;
            z-index: 10;
        }
        .gold-braiding::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 12px; height: 12px;
            border-bottom: 2px solid #48A3CC;
            border-right: 2px solid #48A3CC;
            z-index: 10;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #010409; }
        ::-webkit-scrollbar-thumb { background: #5F9AAE; border-radius: 10px; }
        
        .glass-modal {
            backdrop-filter: blur(40px);
            background: rgba(2, 45, 91, 0.85);
            border: 1px solid rgba(95, 154, 174, 0.3);
        }

        /* Page transition animations */
        @keyframes page-fade-in {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        main > * {
            animation: page-fade-in 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Smooth hover transitions for all interactive elements */
        button, a, [role="button"] {
            transition: all 0.15s ease;
        }

        /* Better scrollbar for main content */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(95, 154, 174, 0.3);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(95, 154, 174, 0.5);
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root">
      <!-- Splash screen shown while React initializes -->
      <div id="splash" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#010409;gap:24px;">
        <div style="width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,#48A3CC 0%,#022D5B 100%);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,0.1);box-shadow:0 0 40px rgba(72,163,204,0.3);">RL</div>
        <div style="text-align:center;">
          <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;color:#e2e8f0;letter-spacing:3px;">REIT LENS</div>
          <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;font-weight:600;color:#5F9AAE;letter-spacing:4px;margin-top:6px;">INSTITUTIONAL TERMINAL</div>
        </div>
        <div style="width:120px;height:2px;background:#022D5B;border-radius:2px;overflow:hidden;margin-top:8px;">
          <div style="width:40%;height:100%;background:linear-gradient(90deg,#48A3CC,#FF9D3C);border-radius:2px;animation:splash-loader 1.2s ease-in-out infinite;"></div>
        </div>
      </div>
      <style>
        @keyframes splash-loader {
          0% { transform: translateX(-100%); }
          50% { transform: translateX(150%); }
          100% { transform: translateX(-100%); }
        }
      </style>
    </div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
